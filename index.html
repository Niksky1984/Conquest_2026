<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0c" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="icon" href="icon.jpg" type="image/jpeg">
<link rel="apple-touch-icon" href="icon.jpg">
<title>Conquest</title>

<link rel="manifest" href='data:application/manifest+json,{"name":"Conquest","short_name":"Conquest","display":"fullscreen","orientation":"portrait","background_color":"%230a0a0c","theme_color":"%230a0a0c","start_url":".","icons":[{"src":"icon.jpg","sizes":"192x192 512x512","type":"image/jpeg","purpose":"any maskable"}]}' />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@500;600&family=Spectral:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<!-- React (no build step) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- Firebase (compat = works without a bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
  :root{
    --abyss:#0a0a0c;       /* base background */
    --iron:#16171c;        /* raised panel */
    --iron-2:#1f2128;      /* button face */
    --line:#2c2e36;        /* hairline */
    --ember:#d24a2c;       /* action / danger */
    --ember-glow:#ff6a3d;
    --jade:#46b87a;        /* approved + locked */
    --gold:#d9b24a;        /* reward */
    --bone:#e9e3d6;        /* primary text */
    --ash:#8b8678;         /* muted text */
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:var(--abyss);color:var(--bone);
    font-family:'Spectral',Georgia,serif;overflow:hidden;overscroll-behavior:none;}
  #root{height:100%;}
  button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}
  .display{font-family:'Cinzel Decorative',serif;}
  .heading{font-family:'Cinzel',serif;letter-spacing:.04em;}

  .screen{position:fixed;inset:0;display:flex;flex-direction:column;}

  /* ---------- video background ---------- */
  .bg-wrap{position:fixed;inset:0;z-index:0;overflow:hidden;background:#000;}
  .bg-wrap video,.bg-wrap .bg-fallback{position:absolute;inset:0;width:100%;height:100%;
    object-fit:cover;}
  .bg-fallback{background:
    radial-gradient(120% 80% at 50% 0%, #241410 0%, #0a0a0c 60%),
    radial-gradient(100% 60% at 50% 100%, #1a0e14 0%, transparent 70%);}
  .scrim{position:fixed;inset:0;z-index:1;pointer-events:none;background:
    linear-gradient(180deg, rgba(10,10,12,.55) 0%, rgba(10,10,12,.15) 35%,
      rgba(10,10,12,.45) 70%, rgba(10,10,12,.92) 100%);}

  /* Intro Screen Image */
  .intro-bg { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity: 0.6; }

  /* ---------- welcome ---------- */
  .welcome{z-index:2;justify-content:space-between;
    padding:max(env(safe-area-inset-top),28px) 22px max(env(safe-area-inset-bottom),26px);}
  .crest{text-align:center;margin-top:18px;}
  .crest .mark{font-size:13px;letter-spacing:.5em;color:var(--ember-glow);
    text-transform:uppercase;opacity:.85;}
  .crest h1{font-size:clamp(40px,13vw,68px);font-weight:900;margin:.18em 0 0;
    line-height:.92;color:var(--bone);text-shadow:0 2px 28px rgba(255,106,61,.28),0 1px 0 #000;}
  .crest .rule{width:64px;height:2px;margin:16px auto 0;
    background:linear-gradient(90deg,transparent,var(--ember),transparent);}

  .menu{display:flex;flex-direction:column;gap:13px;margin-bottom:6px;}
  .plate{position:relative;display:flex;align-items:center;justify-content:center;
    height:60px;border-radius:11px;background:linear-gradient(180deg,var(--iron-2),#121319);
    border:1px solid var(--line);box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 8px 22px rgba(0,0,0,.5);
    font-family:'Cinzel',serif;font-weight:600;font-size:17px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--bone);transition:transform .12s,border-color .2s,box-shadow .2s;}
  .plate::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;
    background:var(--ember);box-shadow:0 0 12px var(--ember-glow);opacity:.85;}
  .plate:active{transform:translateY(1px) scale(.995);}
  .plate.lit{border-color:rgba(210,74,44,.5);box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 0 0 1px rgba(210,74,44,.15),0 8px 26px rgba(0,0,0,.55);}
  .plate.quit::before{background:var(--ash);box-shadow:none;}
  .plate.disabled{opacity:.38;pointer-events:none;}
  .plate.disabled::before{background:var(--ash);box-shadow:none;}
  .plate .sub{position:absolute;right:14px;font-family:'Spectral';font-size:11px;
    letter-spacing:.05em;text-transform:none;color:var(--ash);font-style:italic;}
  .plate.alert{border-color:rgba(217,178,74,.6);animation:plateAlert 1.3s ease-in-out infinite;}
  .plate.alert::before{background:var(--gold);box-shadow:0 0 12px var(--gold);}
  .plate.alert .sub{color:var(--gold);font-style:normal;font-family:'Cinzel';letter-spacing:.06em;}
  @keyframes plateAlert{0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 8px 22px rgba(0,0,0,.5);}
    50%{box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 0 0 1px rgba(217,178,74,.5),0 0 22px 2px rgba(217,178,74,.5);}}

  /* ---------- status pill ---------- */
  .pill{position:fixed;z-index:5;top:max(env(safe-area-inset-top),12px);right:14px;
    display:flex;align-items:center;gap:7px;padding:6px 11px;border-radius:999px;
    background:rgba(16,17,21,.7);border:1px solid var(--line);backdrop-filter:blur(8px);
    font-size:11px;letter-spacing:.06em;color:var(--ash);}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ash);}
  .dot.on{background:var(--jade);box-shadow:0 0 8px var(--jade);}
  .dot.off{background:var(--ember);box-shadow:0 0 8px var(--ember);}
  .pill .role{color:var(--bone);text-transform:uppercase;font-family:'Cinzel';font-weight:500;}

  /* ---------- HUD (Conqueror Top Bar) ---------- */
  .app-slave .back, .app-slave .world-top, .app-slave .line-head { top: max(env(safe-area-inset-top), 86px); }
  .app-slave .line-scroll { padding-top: 150px; }
  .app-slave .welcome { padding-top: max(env(safe-area-inset-top), 106px); }
  .app-slave .pill { display: none; }

  .hud{position:fixed;z-index:20;top:max(env(safe-area-inset-top),12px);left:12px;right:12px;
    border-radius:12px; overflow:hidden;
    border:2px solid #3a2e22; box-shadow:0 12px 34px rgba(0,0,0,.8), inset 0 0 0 1px rgba(255,255,255,.1);
    font-family:'Cinzel',serif;color:var(--bone);}
  
  .hud-bg{position:absolute;inset:0;z-index:0;background:#101116; overflow:hidden;}
  .hud-bg-fallback{
    position:absolute;inset:-50%;
    background:
      radial-gradient(circle at 50% 50%, rgba(76, 29, 149, 0.4) 0%, transparent 60%),
      radial-gradient(circle at 80% 20%, rgba(210, 74, 44, 0.3) 0%, transparent 50%),
      radial-gradient(circle at 20% 80%, rgba(30, 58, 138, 0.4) 0%, transparent 50%),
      #080a0f;
    animation: hudDrift 15s ease-in-out infinite alternate;
  }
  .hud-bg-fallback::after {
    content:''; position:absolute; inset:0;
    background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 24px 24px; opacity: 0.3;
    animation: hudStars 20s linear infinite;
  }
  @keyframes hudDrift { 0% {transform: rotate(0deg) scale(1);} 100% {transform: rotate(5deg) scale(1.1);} }
  @keyframes hudStars { 0% {transform: translateY(0);} 100% {transform: translateY(24px);} }
  
  .hud-content{position:relative;z-index:1;display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:8px;padding:9px 12px;background:linear-gradient(180deg, rgba(22,23,28,.65), rgba(10,10,12,.95)); backdrop-filter:blur(8px);}
  .hud-left{justify-self:start;display:flex;align-items:center;gap:9px;min-width:0;width:100%;}

  .hud-avatar{position:relative;flex:0 0 44px;height:44px;border-radius:50%;background:linear-gradient(180deg, #2a221a, #100d0a);
    border:2px solid #8e734c; box-shadow:0 0 14px rgba(0,0,0,.9), inset 0 2px 4px rgba(255,255,255,.1); display:flex;align-items:center;justify-content:center; overflow:hidden;}
  .hud-avatar img{width:100%;height:100%;object-fit:cover;}

  .hud-info{display:flex;flex-direction:column;gap:4px;min-width:0;flex:1 1 auto;}
  .hud-name-row{display:flex;align-items:baseline;gap:6px;min-width:0;}
  .hud-name{flex:1 1 auto;min-width:0;font-size:14px;font-weight:900;letter-spacing:.04em;text-transform:uppercase;color:#f3e8d3;text-shadow:0 2px 4px rgba(0,0,0,.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hud-lvl{flex:0 0 auto;font-size:12px;color:var(--gold);font-weight:700;letter-spacing:.04em;text-shadow:0 2px 4px rgba(0,0,0,.9);}

  .hud-xp-row {display:flex; align-items:center; gap:6px;}
  .hud-xp-bar{flex:0 0 auto;width:64px;height:8px;background:#050608;border-radius:4px;border:1px solid #3a2e22;overflow:hidden;position:relative;box-shadow:inset 0 2px 4px rgba(0,0,0,.8);}
  .hud-xp-fill{position:absolute;top:0;left:0;bottom:0;width:0%;background:linear-gradient(90deg, #1e3a8a, #3fd4ff);box-shadow:0 0 8px #3fd4ff;transition:width .5s ease;overflow:hidden;}
  .hud-xp-fill::after{content:"";position:absolute;top:0;bottom:0;width:40%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.65),transparent);transform:translateX(-160%);animation:xpShine 2.6s ease-in-out infinite;}
  @keyframes xpShine{0%{transform:translateX(-160%);}55%,100%{transform:translateX(420%);}}
  .hud-xp-text{flex:0 0 auto;font-family:'Spectral';font-style:italic;font-size:10px;color:#a89f91;font-weight:600;white-space:nowrap;text-shadow:0 1px 3px #000;}

  /* Right Side Layout - Updated to stack connection badge under stats */
  .hud-right {justify-self:end;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .hud-stats{display:flex;align-items:center;gap:10px;}
  .hud-stat{display:flex;align-items:center;gap:5px;font-size:14px;font-weight:700;letter-spacing:.03em;text-shadow:0 2px 4px rgba(0,0,0,.9);}
  .hud-stat.vnd{color:#ffd56b;}
  .hud-stat.gem{color:#bdf1ff;}
  .hs-icon{flex:0 0 auto;width:22px;height:22px;object-fit:contain;border-radius:50%;filter:drop-shadow(0 2px 3px rgba(0,0,0,.8));}
  
  .hud-conn-status {display:flex;align-items:center;gap:5px;font-family:'Cinzel';font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase; background:rgba(0,0,0,0.4); padding:3px 7px; border-radius:6px; border:1px solid rgba(255,255,255,0.06);}
  .hud-conn-status .dot {width:5px;height:5px;border-radius:50%;}
  .hud-conn-status.on {color:var(--jade);}
  .hud-conn-status.on .dot {background:var(--jade);box-shadow:0 0 6px var(--jade);}
  .hud-conn-status.off {color:var(--ember);}
  .hud-conn-status.off .dot {background:var(--ember);box-shadow:0 0 6px var(--ember);}

  /* ---------- onboarding / panels ---------- */
  .panel{z-index:3;justify-content:center;align-items:center;
    padding:28px 24px max(env(safe-area-inset-bottom),28px);}
  .card{width:100%;max-width:430px;background:linear-gradient(180deg,var(--iron),#101116);
    border:1px solid var(--line);border-radius:18px;padding:26px 22px;
    box-shadow:0 30px 70px rgba(0,0,0,.6);}
  .card h2{font-family:'Cinzel Decorative';font-weight:700;font-size:25px;margin:0 0 6px;text-align:center;}
  .card p.lead{margin:0 0 22px;text-align:center;color:var(--ash);font-size:14px;line-height:1.5;}
  label.field{display:block;margin:0 0 16px;}
  label.field span{display:block;font-family:'Cinzel';font-size:12px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ash);margin-bottom:7px;}
  input{width:100%;height:50px;padding:0 15px;border-radius:11px;background:#0d0e12;
    border:1px solid var(--line);color:var(--bone);font-size:16px;font-family:'Spectral';
    outline:none;transition:border-color .15s;}
  input:focus{border-color:var(--ember);}
  input.code{text-align:center;font-family:'Cinzel';font-size:26px;letter-spacing:.5em;
    text-transform:uppercase;padding-left:.5em;}
  .btn{width:100%;height:52px;border-radius:12px;font-family:'Cinzel';font-weight:600;
    font-size:15px;letter-spacing:.12em;text-transform:uppercase;margin-top:8px;
    background:linear-gradient(180deg,var(--ember),#a5331c);color:#fff;
    box-shadow:0 8px 24px rgba(210,74,44,.35);transition:transform .1s,opacity .2s;}
  .btn:active{transform:translateY(1px);}
  .btn[disabled]{opacity:.45;pointer-events:none;box-shadow:none;}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--bone);box-shadow:none;}
  .err{color:var(--ember-glow);font-size:13px;text-align:center;min-height:18px;margin-top:4px;}

  .role-pick{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:8px 0 6px;}
  .role-tile{display:flex;flex-direction:column;align-items:center;gap:10px;padding:24px 10px;
    border-radius:14px;background:#0d0e12;border:1px solid var(--line);transition:.15s;}
  .role-tile:active{transform:scale(.98);}
  .role-tile .glyph{font-size:34px;line-height:1;}
  .role-tile .t{font-family:'Cinzel';font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:15px;}
  .role-tile .d{font-size:12px;color:var(--ash);text-align:center;line-height:1.4;}

  .code-box{margin:18px 0;padding:18px;border-radius:14px;text-align:center;
    background:#0d0e12;border:1px dashed rgba(217,178,74,.5);}
  .code-box .lbl{font-family:'Cinzel';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);}
  .code-box .val{font-family:'Cinzel Decorative';font-weight:900;font-size:40px;letter-spacing:.18em;
    color:var(--gold);margin-top:6px;text-shadow:0 0 22px rgba(217,178,74,.35);}

  .stub{z-index:3;justify-content:center;align-items:center;text-align:center;padding:30px;}
  .stub .icon{font-size:46px;margin-bottom:14px;}
  .stub h2{font-family:'Cinzel Decorative';font-weight:700;font-size:26px;margin:0 0 8px;}
  .stub p{color:var(--ash);max-width:300px;line-height:1.55;margin:0 0 26px;}
  .back{position:fixed;z-index:6;top:max(env(safe-area-inset-top),12px);left:12px;
    width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;
    background:rgba(16,17,21,.7);border:1px solid var(--line);backdrop-filter:blur(8px);font-size:20px;}

  .opt-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;
    border-bottom:1px solid var(--line);}
  .opt-row:last-of-type{border-bottom:none;}
  .opt-row .k{font-family:'Cinzel';font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ash);}
  .opt-row .v{font-size:15px;color:var(--bone);}

  .modal-bg{position:fixed;inset:0;z-index:20;background:rgba(5,5,7,.78);backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;padding:28px;}
  .modal{width:100%;max-width:360px;background:linear-gradient(180deg,var(--iron),#101116);
    border:1px solid var(--line);border-radius:16px;padding:24px;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.7);}
  .modal h3{font-family:'Cinzel Decorative';font-weight:700;font-size:21px;margin:0 0 8px;}
  .modal p{color:var(--ash);font-size:14px;line-height:1.5;margin:0 0 20px;}
  .modal .row{display:flex;gap:12px;}
  .modal .row .btn{margin:0;flex:1 1 0;min-width:0;}

  /* ---------- world of conquest ---------- */
  .world-screen{z-index:3;}
  .world-stage{position:absolute;inset:0;z-index:0;transition:background .5s ease;}
  .world-vignette{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:linear-gradient(180deg, rgba(6,5,6,.65) 0%, rgba(6,5,6,.1) 30%, rgba(6,5,6,.35) 65%, rgba(6,5,6,.95) 100%);}
  .world-top{position:fixed;z-index:6;top:max(env(safe-area-inset-top),14px);left:0;right:0;
    display:flex;align-items:center;justify-content:center;}
  .world-top .ttl{font-family:'Cinzel';font-size:13px;letter-spacing:.32em;text-transform:uppercase;color:var(--ash);}
  .world-body{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;
    padding:90px 26px max(env(safe-area-inset-bottom),32px);}
  .world-name{font-family:'Cinzel Decorative';font-weight:900;font-size:clamp(34px,11vw,58px);
    line-height:1;color:var(--bone);text-shadow:0 4px 30px rgba(0,0,0,.6);margin:0;}
  .world-state{margin-top:18px;display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:999px;
    font-family:'Cinzel';font-size:12px;letter-spacing:.14em;text-transform:uppercase;
    background:rgba(10,10,12,.5);border:1px solid var(--line);backdrop-filter:blur(6px);}
  .world-state.locked{color:var(--gold);border-color:rgba(217,178,74,.4);}
  .world-state.active{color:var(--jade);border-color:rgba(70,184,122,.45);}
  .world-cta{margin-top:36px;width:min(360px,82vw);}
  .car-arrow{position:fixed;z-index:6;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--bone);
    background:rgba(10,10,12,.55);border:1px solid var(--line);backdrop-filter:blur(6px);}
  .car-arrow.l{left:14px;} .car-arrow.r{right:14px;}
  .car-arrow:active{transform:translateY(-50%) scale(.92);}
  .car-arrow.hidden{opacity:0;pointer-events:none;}
  .car-dots{position:fixed;z-index:6;left:0;right:0;bottom:max(env(safe-area-inset-bottom),16px);
    display:flex;gap:8px;align-items:center;justify-content:center;}
  .car-dots i{width:7px;height:7px;border-radius:50%;background:rgba(233,227,214,.25);transition:.2s;}
  .car-dots i.on{background:var(--ember);box-shadow:0 0 8px var(--ember-glow);width:20px;border-radius:4px;}
  .world-empty{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:30px;gap:8px;}
  .world-empty .big{font-size:46px;}
  .world-empty h2{font-family:'Cinzel Decorative';font-weight:700;font-size:24px;margin:6px 0 4px;}
  .world-empty p{color:var(--ash);max-width:300px;line-height:1.5;margin:0 0 20px;}
  .fab{position:fixed;z-index:7;right:18px;bottom:max(env(safe-area-inset-bottom),22px);
    height:52px;padding:0 22px;border-radius:26px;display:flex;align-items:center;gap:8px;
    font-family:'Cinzel';font-weight:600;font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:#fff;
    background:linear-gradient(180deg,var(--ember),#a5331c);box-shadow:0 10px 30px rgba(210,74,44,.4);}
  .fab:active{transform:translateY(1px);}
  .theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
  .theme-swatch{height:62px;border-radius:11px;border:2px solid transparent;position:relative;overflow:hidden;
    display:flex;align-items:flex-end;justify-content:center;padding-bottom:7px;}
  .theme-swatch span{font-family:'Cinzel';font-size:10px;letter-spacing:.06em;text-transform:uppercase;
    color:var(--bone);text-shadow:0 1px 4px #000;}
  .theme-swatch.sel{border-color:var(--ember);box-shadow:0 0 0 1px var(--ember),0 0 14px rgba(210,74,44,.4);}

  .world-stage video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .bgtype-tabs{display:flex;gap:8px;margin-bottom:12px;}
  .bgtype-tabs button{flex:1;height:38px;border-radius:9px;border:1px solid var(--line);background:#0d0e12;
    font-family:'Cinzel';font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--ash);transition:.15s;}
  .bgtype-tabs button.on{border-color:var(--ember);color:var(--bone);background:#19110f;}
  .img-drop{height:120px;border-radius:11px;border:1px dashed var(--line);background:#0d0e12;
    display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;
    background-size:cover;background-position:center;}
  .img-drop .hint{font-family:'Spectral';font-size:13px;color:var(--bone);background:rgba(0,0,0,.5);padding:6px 13px;border-radius:8px;}
  .world-actions{display:flex;gap:10px;margin-top:30px;width:min(380px,84vw);flex-wrap:wrap;justify-content:center;}
  .world-actions .btn{margin-top:0;}

function compressImage(file, maxDim = 1280, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("read failed"));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("decode failed"));
      img.onload = () => {
        let w = img.width,
          h = img.height;
        const s = Math.min(1, maxDim / Math.max(w, h));
        w = Math.round(w * s);
        h = Math.round(h * s);
        const c = document.createElement("canvas");
        c.width = w;
        c.height = h;
        c.getContext("2d").drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL("image/jpeg", quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
